<section class="page-layout">

  <app-page-header title="Appointments" subtitle="Manage clinic appointments">
  </app-page-header>

  <div class="page-content">

    @if (store.loading()) {

    <app-loading-spinner></app-loading-spinner>

    } @else if (store.error(); as error) {

    <app-error-panel [message]="error.message">
    </app-error-panel>

    } @else if (store.hasAppointments()) {

      <div class="appointment-toolbar">

      <button mat-flat-button color="primary" (click)="openCreateDialog()">
        Add Appointment
      </button>

      <button mat-stroked-button (click)="exportAppointments()">
        Export CSV
      </button>

      </div>
    <!-- Search -->
    <mat-form-field appearance="outline" class="appointment-search">

      <mat-label>Search appointments</mat-label>

      <input matInput [value]="searchText" (input)="onSearchChanged($any($event.target).value)"
        placeholder="Search by patient or status">

      <mat-icon matSuffix>
        search
      </mat-icon>

    </mat-form-field>

    <!-- Status Filter -->

    <mat-chip-listbox class="appointment-filter" [multiple]="false" [value]="statusFilter"
      (change)="setStatusFilter($event.value)">

      <mat-chip-option value="All">
        All
      </mat-chip-option>

      <mat-chip-option value="Scheduled">
        Scheduled
      </mat-chip-option>

      <mat-chip-option value="Completed">
        Completed
      </mat-chip-option>

      <mat-chip-option value="Cancelled">
        Cancelled
      </mat-chip-option>

    </mat-chip-listbox>

    <!-- Data Table -->

<app-data-table [data]="pagedAppointments()" [columns]="columns" (sortChanged)="sortChanged($event)"
  (view)="viewAppointment($event)" (edit)="editAppointment($event)" (delete)="deleteAppointment($event)">
</app-data-table>

<mat-paginator [length]="filteredAppointments().length" [pageSize]="pageSize" [pageSizeOptions]="[5,10,20]"
  (page)="onPageChanged($event)">
</mat-paginator>

    } @else {

    <app-empty-state message="No appointments found.">
    </app-empty-state>

    }

  </div>

</section>

<ng-template #actionsTemplate let-appointment>

  <div class="action-buttons">

    <button mat-stroked-button color="primary" (click)="viewAppointment(appointment)">
      View
    </button>

    <button mat-flat-button color="primary" (click)="editAppointment(appointment)">
      Edit
    </button>

    <button mat-flat-button color="warn" [disabled]="store.deleting()" (click)="deleteAppointment(appointment)">

      {{ store.deleting() ? 'Deleting...' : 'Delete' }}

    </button>

  </div>

</ng-template>
