<table mat-table [dataSource]="data" matSort (matSortChange)="sortChanged.emit($event)">

  @for (column of columns; track column.key) {

<ng-container [matColumnDef]="columnName(column)">

  <th mat-header-cell *matHeaderCellDef>
    @if (column.sortable) {
    <span [mat-sort-header]="columnName(column)">
      {{ column.header }}
    </span>
    } @else {
    {{ column.header }}
    }
  </th>

  <td mat-cell *matCellDef="let row">

    @if (column.key === '__actions') {

    <div class="action-buttons">

      <button mat-stroked-button color="primary" (click)="view.emit(row)">
        View
      </button>

      <button mat-flat-button color="primary" (click)="edit.emit(row)">
        Edit
      </button>

      <button mat-flat-button color="warn" (click)="delete.emit(row)">
        Delete
      </button>

    </div>

    } @else {

    {{ $any(row)[column.key] }}

    }

  </td>

</ng-container>

  }

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
