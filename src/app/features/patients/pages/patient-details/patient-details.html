<section class="page-layout">

  <button mat-stroked-button routerLink="/patients">
    ← Back to Patients
  </button>

  <app-page-header title="Patient Details"></app-page-header>

<div class="page-content">

  @if (store.loading()) {
  <p>Loading patient...</p>
  }

@if (store.error(); as error) {
<app-error-panel [message]="error.message"></app-error-panel>
}

  @if (store.hasSelectedPatient()) {

  <mat-card>

    <mat-card-header>

      <mat-card-title>
        Patient Details
      </mat-card-title>

    </mat-card-header>

    <mat-card-content>

      <p>
        <strong>Id:</strong>
        {{ store.selectedPatient()?.id }}
      </p>

      <p>
        <strong>First Name:</strong>
        {{ store.selectedPatient()?.firstName }}
      </p>

      <p>
        <strong>Last Name:</strong>
        {{ store.selectedPatient()?.lastName }}
      </p>

    </mat-card-content>

  </mat-card>

  }

</div>
</section>
