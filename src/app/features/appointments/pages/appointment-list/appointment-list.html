<section class="page-layout">

  <app-page-header title="Appointments" subtitle="Manage appointments"></app-page-header>

<div class="page-content">

  @if (store.loading()) {

  <div class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading appointments...</p>
  </div>

  }

  @else if (store.error(); as error) {
  <app-error-panel [message]="error.message"></app-error-panel>
  }

  @else if (store.hasAppointments()) {

  <table mat-table [dataSource]="store.appointments()" class="appointment-table">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let appointment">
        {{ appointment.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="patientName">
      <th mat-header-cell *matHeaderCellDef>Patient</th>
      <td mat-cell *matCellDef="let appointment">
        {{ appointment.patientName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="appointmentDate">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let appointment">
        {{ appointment.appointmentDate }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let appointment">
        {{ appointment.status }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>

      <td mat-cell *matCellDef="let appointment">
        <button mat-stroked-button color="primary" [routerLink]="['/appointments', appointment.id]">

          View Details

        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  }

  @else {
    <app-empty-state message="No appointments found."></app-empty-state>
  }

</div>
</section>
