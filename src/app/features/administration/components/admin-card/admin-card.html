<a class="admin-card-link" [routerLink]="route">

  <mat-card class="admin-card">

    <mat-card-content>

      <div class="admin-card-header">

        <mat-icon>
          {{ icon }}
        </mat-icon>

        <div>

          <h3>{{ title }}</h3>

          <p>{{ description }}</p>

        </div>

      </div>

    </mat-card-content>

  </mat-card>

</a>
