<h2 mat-dialog-title>
  {{ isEditMode ? 'Edit Patient' : 'Create Patient' }}
</h2>

<mat-dialog-content>
<app-patient-form #patientForm [patient]="patient">
</app-patient-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>
    Cancel
  </button>

  <button mat-flat-button color="primary" [disabled]="saving()" (click)="save(patientForm)">
    {{ saving() ? 'Saving...' : 'Save' }}
  </button>
</mat-dialog-actions>
